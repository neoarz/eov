syntax = "proto3";

package eov.extension;

// ---------------------------------------------------------------------------
// Extension Host gRPC service
//
// External plugins (Python, Go, etc.) connect to this service to register
// viewport filters and exchange pixel data with the EOV renderer.
// ---------------------------------------------------------------------------

service ExtensionHost {
  rpc RegisterPlugin(RegisterPluginRequest) returns (RegisterPluginResponse);
  rpc UnregisterPlugin(UnregisterPluginRequest) returns (HostCommandResponse);
  rpc GetHostSnapshot(Empty) returns (HostSnapshot);
  rpc ReadRegion(ReadRegionRequest) returns (ReadRegionResponse);
  rpc OpenFile(OpenFileRequest) returns (HostCommandResponse);
  rpc SetActiveViewport(SetActiveViewportRequest) returns (HostCommandResponse);
  rpc FitActiveViewport(Empty) returns (HostCommandResponse);
  rpc FrameActiveRect(FrameActiveRectRequest) returns (HostCommandResponse);
  rpc LogMessage(LogMessageRequest) returns (HostCommandResponse);
  rpc RegisterToolbarButton(RegisterToolbarButtonRequest) returns (HostCommandResponse);
  rpc UnregisterToolbarButton(UnregisterToolbarButtonRequest) returns (HostCommandResponse);
  rpc ToolbarActionStream(ToolbarActionStreamRequest) returns (stream ToolbarActionRequest);
  rpc RegisterHudToolbarButton(RegisterHudToolbarButtonRequest) returns (HostCommandResponse);
  rpc UnregisterHudToolbarButton(UnregisterHudToolbarButtonRequest) returns (HostCommandResponse);
  rpc HudToolbarActionStream(HudToolbarActionStreamRequest) returns (stream HudToolbarActionRequest);

  // Register a viewport filter. Returns a unique filter id.
  rpc RegisterFilter(RegisterFilterRequest) returns (RegisterFilterResponse);

  // Unregister a previously registered filter.
  rpc UnregisterFilter(UnregisterFilterRequest) returns (UnregisterFilterResponse);

  // Enable or disable a registered filter.
  rpc SetFilterEnabled(SetFilterEnabledRequest) returns (SetFilterEnabledResponse);

  // Apply a CPU-side filter: receive RGBA pixels, return transformed pixels.
  // Called by the host when the render backend is CPU.
  rpc ApplyFilterCpu(ApplyFilterCpuRequest) returns (ApplyFilterCpuResponse);

  // Streaming variant: host pushes frames, plugin returns processed frames.
  rpc ApplyFilterCpuStream(stream ApplyFilterCpuRequest) returns (stream ApplyFilterCpuResponse);

  // Notify the plugin that a GPU frame is ready for processing via DMA-BUF.
  // The actual DMA-BUF fd and sync fence fds are passed out-of-band over
  // a Unix domain socket (see dma_buf_socket_path in RegisterFilterResponse).
  // This RPC carries only the metadata; the plugin reads the fds from the
  // socket, processes the image on the GPU, and responds when done.
  rpc ApplyFilterGpu(ApplyFilterGpuRequest) returns (ApplyFilterGpuResponse);
}

// ---------------------------------------------------------------------------
// Messages
// ---------------------------------------------------------------------------

message Empty {}

message RegisterPluginRequest {
  string plugin_id = 1;
  string display_name = 2;
  string version = 3;
  string language = 4;
}

message RegisterPluginResponse {
  string plugin_handle = 1;
  string plugin_id = 2;
  HostSnapshot host_snapshot = 3;
}

message UnregisterPluginRequest {
  string plugin_handle = 1;
}

message HostSnapshot {
  string app_name = 1;
  string app_version = 2;
  string render_backend = 3;
  string filtering_mode = 4;
  bool split_enabled = 5;
  uint32 focused_pane = 6;
  repeated OpenFileInfo open_files = 7;
  OpenFileInfo active_file = 8;
  ViewportSnapshot active_viewport = 9;
  repeated string recent_files = 10;
  bool has_active_file = 11;
  bool has_active_viewport = 12;
}

message OpenFileInfo {
  int32 file_id = 1;
  string path = 2;
  string filename = 3;
  uint64 width = 4;
  uint64 height = 5;
  uint32 level_count = 6;
  string vendor = 7;
  double mpp_x = 8;
  double mpp_y = 9;
  double objective_power = 10;
  string scan_date = 11;
  bool has_vendor = 12;
  bool has_mpp_x = 13;
  bool has_mpp_y = 14;
  bool has_objective_power = 15;
  bool has_scan_date = 16;
}

message ViewportSnapshot {
  uint32 pane_index = 1;
  double center_x = 2;
  double center_y = 3;
  double zoom = 4;
  double width = 5;
  double height = 6;
  double image_width = 7;
  double image_height = 8;
  double bounds_left = 9;
  double bounds_top = 10;
  double bounds_right = 11;
  double bounds_bottom = 12;
}

message ReadRegionRequest {
  int32 file_id = 1;
  uint32 level = 2;
  sint64 x = 3;
  sint64 y = 4;
  uint32 width = 5;
  uint32 height = 6;
}

message ReadRegionResponse {
  bytes rgba_data = 1;
  uint32 width = 2;
  uint32 height = 3;
}

message OpenFileRequest {
  string path = 1;
}

message SetActiveViewportRequest {
  double center_x = 1;
  double center_y = 2;
  double zoom = 3;
}

message FrameActiveRectRequest {
  double x = 1;
  double y = 2;
  double width = 3;
  double height = 4;
}

enum LogLevel {
  LOG_LEVEL_TRACE = 0;
  LOG_LEVEL_DEBUG = 1;
  LOG_LEVEL_INFO = 2;
  LOG_LEVEL_WARN = 3;
  LOG_LEVEL_ERROR = 4;
}

message LogMessageRequest {
  string plugin_handle = 1;
  LogLevel level = 2;
  string message = 3;
}

message HostCommandResponse {}

message RegisterToolbarButtonRequest {
  string plugin_handle = 1;
  string button_id = 2;
  string tooltip = 3;
  string action_id = 4;
  string icon_svg = 5;
}

message UnregisterToolbarButtonRequest {
  string plugin_handle = 1;
  string button_id = 2;
}

message ToolbarActionStreamRequest {
  string plugin_handle = 1;
}

message ToolbarActionRequest {
  string plugin_handle = 1;
  string plugin_id = 2;
  string button_id = 3;
  string action_id = 4;
}

message RegisterHudToolbarButtonRequest {
  string plugin_handle = 1;
  string button_id = 2;
  string tooltip = 3;
  string icon_svg = 4;
  string action_id = 5;
}

message UnregisterHudToolbarButtonRequest {
  string plugin_handle = 1;
  string button_id = 2;
}

message HudToolbarActionStreamRequest {
  string plugin_handle = 1;
}

message HudToolbarActionRequest {
  string plugin_handle = 1;
  string plugin_id = 2;
  string button_id = 3;
  string action_id = 4;
  ViewportSnapshot viewport = 5;
}

message RegisterFilterRequest {
  string plugin_handle = 1;

  // Human-readable name shown in the UI.
  string name = 2;

  // Whether this filter supports CPU pixel processing.
  bool supports_cpu = 3;

  // Whether this filter supports GPU processing (future: DMA-BUF).
  bool supports_gpu = 4;
}

message RegisterFilterResponse {
  // Unique identifier assigned to the filter by the host.
  string filter_id = 1;

  // Path to the Unix domain socket used for DMA-BUF file descriptor passing.
  // Only set when the filter supports GPU and the host has DMA-BUF export
  // capability. The plugin connects to this socket and receives DMA-BUF fds
  // + sync fence fds via SCM_RIGHTS ancillary messages.
  string dma_buf_socket_path = 2;
}

message UnregisterFilterRequest {
  string plugin_handle = 1;
  string filter_id = 2;
}

message UnregisterFilterResponse {}

message SetFilterEnabledRequest {
  string plugin_handle = 1;
  string filter_id = 2;
  bool enabled = 3;
}

message SetFilterEnabledResponse {}

message ApplyFilterCpuRequest {
  // The filter that should process this frame.
  string filter_id = 1;

  // Image dimensions.
  uint32 width = 2;
  uint32 height = 3;

  // Raw RGBA8 pixel data (width * height * 4 bytes).
  bytes rgba_data = 4;
}

message ApplyFilterCpuResponse {
  // Transformed RGBA8 pixel data (same dimensions as the request).
  bytes rgba_data = 1;

  // Image dimensions (set when the host pushes a frame via the streaming RPC).
  uint32 width = 2;
  uint32 height = 3;
}

message ApplyFilterGpuRequest {
  // The filter that should process this frame.
  string filter_id = 1;

  // Image dimensions.
  uint32 width = 2;
  uint32 height = 3;

  // DRM pixel format (e.g. DRM_FORMAT_ABGR8888 = 0x34324241).
  uint32 drm_format = 4;

  // Row stride in bytes.
  uint32 stride = 5;

  // Total DMA-BUF allocation size in bytes.
  uint64 dma_buf_size = 6;

  // Note: the actual DMA-BUF fd and sync fence fds are passed out-of-band
  // over the Unix domain socket (dma_buf_socket_path). For each GPU frame:
  //   1. Host sends 2 fds via SCM_RIGHTS: [dma_buf_fd, ready_fence_fd]
  //   2. Host sends this gRPC request
  //   3. Plugin imports dma_buf_fd, waits on ready_fence_fd
  //   4. Plugin processes the image on the GPU
  //   5. Plugin sends 1 fd via SCM_RIGHTS: [done_fence_fd]
  //   6. Plugin sends ApplyFilterGpuResponse
}

message ApplyFilterGpuResponse {
  // Whether the filter was applied successfully.
  bool success = 1;
}
