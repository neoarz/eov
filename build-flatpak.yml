name: Build Flatpak

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'

permissions:
  contents: write

jobs:
  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-24.04
    env:
      APP_ID: io.eosin.eov

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            flatpak \
            flatpak-builder \
            python3 \
            python3-venv

      - name: Create Python virtual environment
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv .venv

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install aiohttp PyYAML tomlkit

      - name: Install Flatpak runtimes
        shell: bash
        run: |
          set -euo pipefail
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub \
            org.freedesktop.Platform//25.08 \
            org.freedesktop.Sdk//25.08 \
            org.freedesktop.Sdk.Extension.rust-stable//25.08

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$tag' is not a supported version tag" >&2
            exit 1
          fi

          version="${tag#v}"
          arch="$(flatpak --default-arch)"
          bundle_name="${APP_ID}-${version}-${arch}.flatpak"

          {
            echo "version=$version"
            echo "arch=$arch"
            echo "bundle_name=$bundle_name"
          } >> "$GITHUB_OUTPUT"

      - name: Build Flatpak
        shell: bash
        run: |
          set -euo pipefail
          ./packaging/flatpak/build.sh

      - name: Create Flatpak bundle
        id: bundle
        shell: bash
        run: |
          set -euo pipefail
          flatpak build-export repo build stable
          flatpak build-bundle \
            repo \
            "${{ steps.meta.outputs.bundle_name }}" \
            io.eosin.eov \
            stable

          echo "bundle_path=${{ steps.meta.outputs.bundle_name }}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.bundle_name }}
          path: ${{ steps.bundle.outputs.bundle_path }}
      
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.bundle.outputs.bundle_path }}