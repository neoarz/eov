app-id: io.eosin.eov
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: eov

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/eov/cargo
    CARGO_NET_GIT_FETCH_WITH_CLI: 'true'

modules:
  - name: uthash
    buildsystem: simple
    build-commands:
      - install -Dm644 src/uthash.h /app/include/uthash.h
      - install -Dm644 src/utarray.h /app/include/utarray.h
      - install -Dm644 src/utlist.h /app/include/utlist.h
      - install -Dm644 src/utringbuffer.h /app/include/utringbuffer.h
      - install -Dm644 src/utstack.h /app/include/utstack.h
    sources:
      - type: archive
        url: https://github.com/troydhanson/uthash/archive/v2.3.0.tar.gz
        sha256: e10382ab75518bad8319eb922ad04f907cb20cccb451a3aa980c9d005e661acc

  - name: libdicom
    buildsystem: simple
    build-commands:
      - meson setup _build --prefix=/app --libdir=lib -Dtests=false --wrap-mode=nofallback
      - meson compile -C _build
      - meson install -C _build
    config-opts:
      - -Dtests=false
      - --wrap-mode=nofallback
    sources:
      - type: archive
        url: https://github.com/ImagingDataCommons/libdicom/releases/download/v1.2.0/libdicom-1.2.0.tar.xz
        sha256: 3b8c05ceb6bf667fed997f23b476dd32c3dc6380eee1998185c211d86a7b4918

  - name: openslide
    buildsystem: meson
    config-opts:
      - --libdir=lib
      - -Dtest=disabled
      - --wrap-mode=nofallback
    sources:
      - type: git
        url: https://github.com/openslide/openslide.git
        commit: 615670d924d6dddce3d407d1a6440a32cf5350c7

  - name: eov
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/eov/cargo
        CARGO_NET_OFFLINE: 'true'
        LIBRARY_PATH: /app/lib
        LD_LIBRARY_PATH: /app/lib
        PKG_CONFIG_PATH: /app/lib/pkgconfig:/app/share/pkgconfig
        RUSTFLAGS: -L native=/app/lib

    build-commands:
      - mkdir -p .cargo
      - install -Dm0644 cargo/config .cargo/config.toml
      - cargo --offline build --release --locked --bin eov -vv

      - install -Dm755 target/release/eov /app/bin/eov
      - install -Dm644 assets/linux/io.eosin.eov.desktop /app/share/applications/io.eosin.eov.desktop
      - install -Dm644 assets/linux/io.eosin.eov.metainfo.xml /app/share/metainfo/io.eosin.eov.metainfo.xml
      - install -Dm644 assets/linux/COPYING.third-party /app/share/doc/eov/COPYING.third-party
      - install -Dm644 assets/linux/licenses/LGPL-2.1.txt /app/share/doc/eov/licenses/LGPL-2.1.txt
      - install -Dm644 images/logo_256.png /app/share/icons/hicolor/256x256/apps/io.eosin.eov.png

    sources:
      - type: dir
        path: ../..
        skip:
          - .git
          - .venv
          - dist
          - target
          - tmp
          - build
          - .flatpak-builder

      - cargo-sources.json