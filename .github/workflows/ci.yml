name: CI

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          version="1.7.12"
          curl -fsSL -o /tmp/actionlint.tgz \
            "https://github.com/rhysd/actionlint/releases/download/v${version}/actionlint_${version}_linux_amd64.tar.gz"
          tar -xzf /tmp/actionlint.tgz -C /tmp actionlint
          sudo install -m 0755 /tmp/actionlint /usr/local/bin/actionlint
      - run: actionlint

  check:
    name: Cargo Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libegl1-mesa-dev \
            libfontconfig-dev \
            libfreetype6-dev \
            libopenslide-dev \
            libwayland-dev \
            libx11-dev \
            libxkbcommon-dev \
            pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: |
            cargo check --workspace --all-targets
            cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Cargo Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libegl1-mesa-dev \
            libfontconfig-dev \
            libfreetype6-dev \
            libopenslide-dev \
            libwayland-dev \
            libx11-dev \
            libxkbcommon-dev \
            pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets

  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit

  packaging-smoke:
    name: Packaging Smoke Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Validate packaging entrypoints
        shell: bash
        run: |
          set -euo pipefail
          bash -n packaging/appimage/build.sh
          bash -n packaging/flatpak/build.sh
          test -f packaging/appimage/AppRun
          test -f assets/linux/io.eosin.eov.desktop
          test -f assets/linux/io.eosin.eov.metainfo.xml
          test -d assets/linux/licenses
