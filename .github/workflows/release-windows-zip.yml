name: Release Windows Zip

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and release Windows zip (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    # ---------------------------------------------------------------
    # Architecture matrix
    #
    # Each entry maps a target architecture to:
    #   runner           – GitHub-hosted runner label
    #   msvc_arch        – MSVC /arch parameter for ilammy/msvc-dev-cmd
    #   msystem          – MSYS2 environment (CLANG64 or CLANGARM64)
    #   msys2_prefix     – MSYS2 package name prefix
    #   lib_machine      – MSVC lib.exe /machine target
    #   rust_target      – Rust target triple
    #   ntldd_filter     – grep pattern for ntldd output to find
    #                      non-system DLLs from the MSYS2 environment
    #
    # To add a new architecture, append another include entry.
    # ---------------------------------------------------------------
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: windows-latest
            msvc_arch: x64
            msystem: CLANG64
            msys2_prefix: mingw-w64-clang-x86_64
            lib_machine: x64
            rust_target: x86_64-pc-windows-msvc
            ntldd_filter: clang64

          # NOTE: Requires GitHub Actions ARM64 Windows runner access.
          # If unavailable, remove this entry and build on a self-hosted
          # ARM64 Windows runner instead.
          - arch: arm64
            runner: windows-11-arm
            msvc_arch: arm64
            msystem: CLANGARM64
            msys2_prefix: mingw-w64-clang-aarch64
            lib_machine: arm64
            rust_target: aarch64-pc-windows-msvc
            ntldd_filter: clangarm64

    env:
      # OpenSlide source commit to build (from openslide/openslide.git).
      OPENSLIDE_COMMIT: "615670d924d6dddce3d407d1a6440a32cf5350c7"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.arch }}

      - name: Set up MSYS2 (${{ matrix.msystem }})
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            ${{ matrix.msys2_prefix }}-clang
            ${{ matrix.msys2_prefix }}-meson
            ${{ matrix.msys2_prefix }}-ninja
            ${{ matrix.msys2_prefix }}-pkg-config
            ${{ matrix.msys2_prefix }}-cairo
            ${{ matrix.msys2_prefix }}-gdk-pixbuf2
            ${{ matrix.msys2_prefix }}-glib2
            ${{ matrix.msys2_prefix }}-libjpeg-turbo
            ${{ matrix.msys2_prefix }}-libpng
            ${{ matrix.msys2_prefix }}-libtiff
            ${{ matrix.msys2_prefix }}-libxml2
            ${{ matrix.msys2_prefix }}-openjpeg2
            ${{ matrix.msys2_prefix }}-sqlite3
            ${{ matrix.msys2_prefix }}-zlib
            ${{ matrix.msys2_prefix }}-ntldd
            ${{ matrix.msys2_prefix }}-tools
            git

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          cargo_version="$(sed -n 's/^version = "\([^"]*\)"$/\1/p' app/Cargo.toml | head -n 1)"
          is_release="false"
          tag="${GITHUB_REF_NAME}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual run — if dispatched on a version tag, treat it as a
            # release; otherwise fall back to Cargo.toml version.
            if [[ "$tag" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)([-+][0-9A-Za-z.-]+)?$ ]]; then
              version="${tag#v}"
              is_release="true"
              echo "workflow_dispatch on tag: version $version (is_release=true)"
            else
              version="$cargo_version"
              tag="v${version}"
              echo "workflow_dispatch on branch: using Cargo.toml version $version"
            fi
          else
            if [[ ! "$tag" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)([-+][0-9A-Za-z.-]+)?$ ]]; then
              echo "Tag '$tag' is not a supported version tag" >&2
              exit 1
            fi

            version="${tag#v}"
            if [[ "$cargo_version" != "$version" ]]; then
              echo "Tag version '$version' does not match app/Cargo.toml version '$cargo_version'" >&2
              exit 1
            fi
            is_release="true"
          fi

          artifact_name="eov-${tag}-windows-${{ matrix.arch }}.zip"
          checksum_name="${artifact_name}.sha256"

          {
            echo "tag=$tag"
            echo "version=$version"
            echo "is_release=$is_release"
            echo "artifact_name=$artifact_name"
            echo "checksum_name=$checksum_name"
          } >> "$GITHUB_OUTPUT"

      - name: Install uthash headers
        shell: msys2 {0}
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/troydhanson/uthash/archive/v2.3.0.tar.gz | tar xz --exclude='uthash-2.3.0/include'
          install -Dm644 uthash-2.3.0/src/uthash.h "$MSYSTEM_PREFIX/include/uthash.h"
          install -Dm644 uthash-2.3.0/src/utarray.h "$MSYSTEM_PREFIX/include/utarray.h"
          install -Dm644 uthash-2.3.0/src/utlist.h "$MSYSTEM_PREFIX/include/utlist.h"
          install -Dm644 uthash-2.3.0/src/utringbuffer.h "$MSYSTEM_PREFIX/include/utringbuffer.h"
          install -Dm644 uthash-2.3.0/src/utstack.h "$MSYSTEM_PREFIX/include/utstack.h"
          rm -rf uthash-2.3.0

      - name: Build libdicom
        shell: msys2 {0}
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/ImagingDataCommons/libdicom/releases/download/v1.2.0/libdicom-1.2.0.tar.xz | tar xJ
          cd libdicom-1.2.0
          meson setup _build \
            --prefix="$MSYSTEM_PREFIX" \
            --libdir=lib \
            -Dtests=false \
            --wrap-mode=nofallback
          meson compile -C _build
          meson install -C _build

      - name: Build OpenSlide from source
        id: openslide
        shell: msys2 {0}
        run: |
          set -euo pipefail
          git clone https://github.com/openslide/openslide.git openslide-src
          cd openslide-src
          git checkout "$OPENSLIDE_COMMIT"
          meson setup _build \
            --prefix="$MSYSTEM_PREFIX" \
            --libdir=lib \
            -Dtest=disabled \
            --wrap-mode=nofallback
          meson compile -C _build
          meson install -C _build

          # Export the MSYS2 prefix as a Windows path for later steps
          echo "msys_prefix=$(cygpath -w "$MSYSTEM_PREFIX")" >> "$GITHUB_OUTPUT"
          echo "Installed OpenSlide DLLs:"
          ls -la "$MSYSTEM_PREFIX"/bin/libopenslide*

      # ---------------------------------------------------------------
      # Generate an MSVC-compatible import library for OpenSlide.
      #
      # gendef (from mingw-w64-tools) reliably extracts DLL exports
      # into a .def file.  MSVC lib.exe then creates the import
      # library from that .def — guaranteed linker-compatible.
      # ---------------------------------------------------------------
      - name: Generate OpenSlide .def file
        shell: msys2 {0}
        run: |
          set -euo pipefail
          dll=$(find "$MSYSTEM_PREFIX/bin" -maxdepth 1 -name 'libopenslide-*.dll' -type f | head -1)
          [[ -n "$dll" ]] || { echo "No OpenSlide DLL found in $MSYSTEM_PREFIX/bin" >&2; exit 1; }
          echo "Generating .def from: $dll"

          mkdir -p openslide-msvc
          gendef - "$dll" > openslide-msvc/openslide.def

          echo "=== openslide.def ==="
          cat openslide-msvc/openslide.def

          export_count=$(grep -c '^openslide_' openslide-msvc/openslide.def || true)
          echo "Exports found: $export_count"
          if [[ "$export_count" -lt 1 ]]; then
            echo "ERROR: .def contains no openslide exports" >&2
            exit 1
          fi

      - name: Create MSVC import library for OpenSlide
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $defPath = "openslide-msvc\openslide.def"
          $libPath = "openslide-msvc\openslide.lib"

          # Create the import library that matches #[link(name = "openslide")]
          lib /def:$defPath /out:$libPath /machine:${{ matrix.lib_machine }}

          if (-not (Test-Path $libPath)) {
            Write-Error "lib.exe failed to create $libPath"
            exit 1
          }

          $size = (Get-Item $libPath).Length
          Write-Host "Created $libPath ($size bytes)"

          # Verify the import library contains expected symbols
          $symbols = & dumpbin /linkermember:1 $libPath 2>&1 | Out-String
          if ($symbols -notmatch 'openslide_') {
            Write-Host "=== dumpbin /linkermember:1 ==="
            Write-Host $symbols
            Write-Error "Import library does not contain openslide symbols"
            exit 1
          }
          Write-Host "Verified: openslide symbols present in import library"

      - name: Build release binary
        shell: pwsh
        run: |
          $libDir = Join-Path (Get-Location) "openslide-msvc"
          $env:RUSTFLAGS = "-L native=$libDir"
          cargo build --release --target ${{ matrix.rust_target }} --bin eov

      - name: Collect runtime DLLs
        shell: msys2 {0}
        run: |
          set -euo pipefail
          mkdir -p staging/eov

          # Find the built OpenSlide DLL
          openslide_dll=$(find "$MSYSTEM_PREFIX/bin" -maxdepth 1 -name 'libopenslide-*.dll' -type f | head -1)
          if [[ -z "$openslide_dll" ]]; then
            echo "No OpenSlide DLL found in $MSYSTEM_PREFIX/bin" >&2
            exit 1
          fi
          echo "Resolving dependencies for: $openslide_dll"

          # Copy the OpenSlide DLL itself
          cp "$openslide_dll" staging/eov/

          # Use ntldd to recursively find all non-system DLL dependencies
          ntldd -R "$openslide_dll" | \
            grep -i "${{ matrix.ntldd_filter }}" | \
            awk '{print $3}' | \
            sort -u | \
            while IFS= read -r dep; do
              echo "  copying: $(basename "$dep")"
              cp "$dep" staging/eov/
            done

          echo ""
          echo "DLLs collected:"
          ls -1 staging/eov/*.dll

      - name: Create zip archive
        shell: pwsh
        run: |
          # Copy the release binary into staging
          Copy-Item "target\${{ matrix.rust_target }}\release\eov.exe" "staging\eov\"

          Write-Host "Zip contents:"
          Get-ChildItem -Path staging\eov | Format-Table Name, Length

          Compress-Archive -Path "staging\eov" -DestinationPath "${{ steps.meta.outputs.artifact_name }}"

          # Generate checksum
          $hash = (Get-FileHash "${{ steps.meta.outputs.artifact_name }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ steps.meta.outputs.artifact_name }}" | Set-Content "${{ steps.meta.outputs.checksum_name }}" -Encoding ASCII -NoNewline

      - name: Upload artifact (workflow_dispatch)
        if: steps.meta.outputs.is_release != 'true'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: |
            ${{ steps.meta.outputs.artifact_name }}
            ${{ steps.meta.outputs.checksum_name }}

      - name: Publish GitHub release
        if: steps.meta.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: eov ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ steps.meta.outputs.artifact_name }}
            ${{ steps.meta.outputs.checksum_name }}