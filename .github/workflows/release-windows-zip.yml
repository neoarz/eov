name: Release Windows Zip

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and release Windows zip
    runs-on: windows-latest
    env:
      # OpenSlide source commit to build (from openslide/openslide.git).
      OPENSLIDE_COMMIT: "615670d924d6dddce3d407d1a6440a32cf5350c7"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Set up MSYS2 (CLANG64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-meson
            mingw-w64-clang-x86_64-ninja
            mingw-w64-clang-x86_64-pkg-config
            mingw-w64-clang-x86_64-cairo
            mingw-w64-clang-x86_64-gdk-pixbuf2
            mingw-w64-clang-x86_64-glib2
            mingw-w64-clang-x86_64-libjpeg-turbo
            mingw-w64-clang-x86_64-libpng
            mingw-w64-clang-x86_64-libtiff
            mingw-w64-clang-x86_64-libxml2
            mingw-w64-clang-x86_64-openjpeg2
            mingw-w64-clang-x86_64-sqlite3
            mingw-w64-clang-x86_64-zlib
            mingw-w64-clang-x86_64-ntldd
            git

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          cargo_version="$(sed -n 's/^version = "\([^"]*\)"$/\1/p' app/Cargo.toml | head -n 1)"
          is_release="false"
          tag="${GITHUB_REF_NAME}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual run — use Cargo.toml version, skip tag validation
            version="$cargo_version"
            tag="v${version}"
            echo "workflow_dispatch: using Cargo.toml version $version"
          else
            if [[ ! "$tag" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)([-+][0-9A-Za-z.-]+)?$ ]]; then
              echo "Tag '$tag' is not a supported version tag" >&2
              exit 1
            fi

            version="${tag#v}"
            if [[ "$cargo_version" != "$version" ]]; then
              echo "Tag version '$version' does not match app/Cargo.toml version '$cargo_version'" >&2
              exit 1
            fi
            is_release="true"
          fi

          artifact_name="eov-${tag}-windows-x86_64.zip"
          checksum_name="${artifact_name}.sha256"

          {
            echo "tag=$tag"
            echo "version=$version"
            echo "is_release=$is_release"
            echo "artifact_name=$artifact_name"
            echo "checksum_name=$checksum_name"
          } >> "$GITHUB_OUTPUT"

      - name: Install uthash headers
        shell: msys2 {0}
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/troydhanson/uthash/archive/v2.3.0.tar.gz | tar xz --exclude='uthash-2.3.0/include'
          install -Dm644 uthash-2.3.0/src/uthash.h "$MSYSTEM_PREFIX/include/uthash.h"
          install -Dm644 uthash-2.3.0/src/utarray.h "$MSYSTEM_PREFIX/include/utarray.h"
          install -Dm644 uthash-2.3.0/src/utlist.h "$MSYSTEM_PREFIX/include/utlist.h"
          install -Dm644 uthash-2.3.0/src/utringbuffer.h "$MSYSTEM_PREFIX/include/utringbuffer.h"
          install -Dm644 uthash-2.3.0/src/utstack.h "$MSYSTEM_PREFIX/include/utstack.h"
          rm -rf uthash-2.3.0

      - name: Build libdicom
        shell: msys2 {0}
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/ImagingDataCommons/libdicom/releases/download/v1.2.0/libdicom-1.2.0.tar.xz | tar xJ
          cd libdicom-1.2.0
          meson setup _build \
            --prefix="$MSYSTEM_PREFIX" \
            --libdir=lib \
            -Dtests=false \
            --wrap-mode=nofallback
          meson compile -C _build
          meson install -C _build

      - name: Build OpenSlide from source
        id: openslide
        shell: msys2 {0}
        run: |
          set -euo pipefail
          git clone https://github.com/openslide/openslide.git openslide-src
          cd openslide-src
          git checkout "$OPENSLIDE_COMMIT"
          meson setup _build \
            --prefix="$MSYSTEM_PREFIX" \
            --libdir=lib \
            -Dtest=disabled \
            --wrap-mode=nofallback
          meson compile -C _build
          meson install -C _build

          # Export the MSYS2 prefix as a Windows path for later steps
          echo "msys_prefix=$(cygpath -w "$MSYSTEM_PREFIX")" >> "$GITHUB_OUTPUT"
          echo "Installed OpenSlide DLLs:"
          ls -la "$MSYSTEM_PREFIX"/bin/libopenslide*

      - name: Generate MSVC import library for OpenSlide
        shell: pwsh
        run: |
          $msysPrefix = "${{ steps.openslide.outputs.msys_prefix }}"

          # Find the OpenSlide DLL
          $dll = Get-ChildItem -Path "$msysPrefix\bin" -Filter "libopenslide*.dll" |
              Where-Object { $_.Name -match '^libopenslide-\d+\.dll$' } |
              Select-Object -First 1

          if (-not $dll) {
            Write-Error "No OpenSlide DLL found in $msysPrefix\bin"
            exit 1
          }

          $dllName = $dll.Name
          Write-Host "Found OpenSlide DLL: $dllName"

          # Extract exports with dumpbin
          $output = & dumpbin /exports $dll.FullName
          $defLines = @("LIBRARY `"$dllName`"", "EXPORTS")
          $inExportTable = $false

          foreach ($line in $output) {
            if ($line -match '^\s+ordinal\s+hint\s+RVA\s+name') {
              $inExportTable = $true
              continue
            }
            if ($inExportTable) {
              if ($line -match '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\S+)') {
                $defLines += "  $($Matches[1])"
              } elseif ($line.Trim() -eq '' -or $line -match '^\s+Summary') {
                break
              }
            }
          }

          New-Item -ItemType Directory -Path openslide-msvc -Force | Out-Null
          $defPath = "openslide-msvc\openslide.def"
          $defLines -join "`n" | Set-Content $defPath -Encoding ASCII
          Write-Host "Generated $defPath with $($defLines.Count - 2) exports"

          # Create the import library that matches #[link(name = "openslide")]
          lib /def:$defPath /out:openslide-msvc\openslide.lib /machine:x64
          Write-Host "Created openslide-msvc\openslide.lib"

      - name: Build release binary
        shell: pwsh
        run: |
          $libDir = Join-Path (Get-Location) "openslide-msvc"
          $env:RUSTFLAGS = "-L native=$libDir"
          cargo build --release --bin eov

      - name: Collect runtime DLLs
        shell: msys2 {0}
        run: |
          set -euo pipefail
          mkdir -p staging/eov

          # Find the built OpenSlide DLL
          openslide_dll=$(find "$MSYSTEM_PREFIX/bin" -maxdepth 1 -name 'libopenslide-*.dll' -type f | head -1)
          if [[ -z "$openslide_dll" ]]; then
            echo "No OpenSlide DLL found in $MSYSTEM_PREFIX/bin" >&2
            exit 1
          fi
          echo "Resolving dependencies for: $openslide_dll"

          # Copy the OpenSlide DLL itself
          cp "$openslide_dll" staging/eov/

          # Use ntldd to recursively find all non-system DLL dependencies
          ntldd -R "$openslide_dll" | \
            grep -i "clang64" | \
            awk '{print $3}' | \
            sort -u | \
            while IFS= read -r dep; do
              echo "  copying: $(basename "$dep")"
              cp "$dep" staging/eov/
            done

          echo ""
          echo "DLLs collected:"
          ls -1 staging/eov/*.dll

      - name: Create zip archive
        shell: pwsh
        run: |
          # Copy the release binary into staging
          Copy-Item "target\release\eov.exe" "staging\eov\"

          Write-Host "Zip contents:"
          Get-ChildItem -Path staging\eov | Format-Table Name, Length

          Compress-Archive -Path "staging\eov" -DestinationPath "${{ steps.meta.outputs.artifact_name }}"

          # Generate checksum
          $hash = (Get-FileHash "${{ steps.meta.outputs.artifact_name }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ steps.meta.outputs.artifact_name }}" | Set-Content "${{ steps.meta.outputs.checksum_name }}" -Encoding ASCII -NoNewline

      - name: Upload artifact (workflow_dispatch)
        if: steps.meta.outputs.is_release != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: |
            ${{ steps.meta.outputs.artifact_name }}
            ${{ steps.meta.outputs.checksum_name }}

      - name: Publish GitHub release
        if: steps.meta.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: eov ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ steps.meta.outputs.artifact_name }}
            ${{ steps.meta.outputs.checksum_name }}