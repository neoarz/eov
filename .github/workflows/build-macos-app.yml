name: macOS

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  release-macos:
    name: Build macOS .app (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    # ---------------------------------------------------------------
    # Architecture matrix
    #
    # Each entry maps a target architecture to:
    #   runner           – GitHub-hosted runner label
    #   rust_target      – Rust target triple
    #   arch_label       – human-readable arch for artifact naming
    #
    # To add a new architecture, append another include entry.
    # ---------------------------------------------------------------
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
            rust_target: aarch64-apple-darwin
            arch_label: arm64

          - arch: x86_64
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            arch_label: x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          brew install openslide

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.arch }}

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          cargo_version="$(sed -n 's/^version = "\([^"]*\)"$/\1/p' app/Cargo.toml | head -n 1)"
          is_release="false"
          tag="${GITHUB_REF_NAME}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "$tag" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)([-+][0-9A-Za-z.-]+)?$ ]]; then
              version="${tag#v}"
              is_release="true"
              echo "workflow_dispatch on tag: version $version (is_release=true)"
            else
              version="$cargo_version"
              tag="v${version}"
              echo "workflow_dispatch on branch: using Cargo.toml version $version"
            fi
          else
            if [[ ! "$tag" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)([-+][0-9A-Za-z.-]+)?$ ]]; then
              echo "Tag '$tag' is not a supported version tag" >&2
              exit 1
            fi

            version="${tag#v}"
            if [[ "$cargo_version" != "$version" ]]; then
              echo "Tag version '$version' does not match app/Cargo.toml version '$cargo_version'" >&2
              exit 1
            fi
            is_release="true"
          fi

          artifact_name="eov-${tag}-macos-${{ matrix.arch_label }}.zip"
          checksum_name="${artifact_name}.sha256"

          {
            echo "tag=$tag"
            echo "version=$version"
            echo "is_release=$is_release"
            echo "artifact_name=$artifact_name"
            echo "checksum_name=$checksum_name"
          } >> "$GITHUB_OUTPUT"

      - name: Package macOS app
        shell: bash
        run: |
          set -euo pipefail
          ./packaging/macos/build.sh
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          RUST_TARGET: ${{ matrix.rust_target }}
          ARCH_LABEL: ${{ matrix.arch_label }}
          ARCHIVE_BASENAME: eov-${{ steps.meta.outputs.tag }}-macos-${{ matrix.arch_label }}
          DIST_DIR: ${{ github.workspace }}
          CREATE_ZIP: "1"
          CREATE_DMG: "0"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: |
            ${{ steps.meta.outputs.artifact_name }}
            ${{ steps.meta.outputs.checksum_name }}
