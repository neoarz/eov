# ---------------------------------------------------------------
# Release orchestrator — the ONLY entrypoint for tag-based releases.
#
# When a version tag (v*.*.*) is pushed, this workflow:
#   1. Calls each platform build workflow in parallel.
#   2. Waits for ALL builds to succeed.
#   3. Creates exactly one GitHub Release with autogenerated notes
#      and uploads every artifact.
#
# If any build fails, the publish-release job is skipped and no
# release is created.  This guarantees atomic releases — either
# every platform artifact is present, or nothing is published.
#
# IMPORTANT: This publish-release job is the ONLY place in the
# entire CI that is allowed to create or edit a GitHub Release.
# No other workflow or job should use softprops/action-gh-release,
# gh release create, or any other release-publishing mechanism.
# ---------------------------------------------------------------
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-appimage:
    name: AppImage
    uses: ./.github/workflows/build-appimage.yml

  build-flatpak:
    name: Flatpak
    uses: ./.github/workflows/build-flatpak.yml

  build-windows:
    name: Windows
    uses: ./.github/workflows/build-windows-zip.yml

  build-macos:
    name: macOS
    uses: ./.github/workflows/build-macos-app.yml

  # ---------------------------------------------------------------
  # Publish the GitHub Release — the ONLY job allowed to create or
  # edit a release.  No other job in any workflow should use
  # softprops/action-gh-release or gh release create.
  #
  # This job runs only after ALL build jobs succeed.  If any build
  # fails, this job is skipped and no release is published.
  # ---------------------------------------------------------------
  publish-release:
    name: Publish GitHub Release
    needs: [build-appimage, build-flatpak, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect release files
        shell: bash
        run: |
          set -euo pipefail

          # Each artifact is downloaded into its own subdirectory.
          # Flatten them into a single directory for upload.
          mkdir -p release-files
          find artifacts -type f \( \
            -name '*.AppImage' -o \
            -name '*.flatpak' -o \
            -name '*.zip' -o \
            -name '*.sha256' \
          \) -exec cp {} release-files/ \;

          echo "Release files:"
          ls -la release-files/

      - name: Derive version from tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: eov ${{ steps.meta.outputs.version }}
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: release-files/*
